<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Shine effect -->
  <ellipse cx="256" cy="150" rx="180" ry="100" fill="url(#glow)"/>
  <!-- G Letter with Friend symbol -->
  <g transform="translate(256, 256)">
    <!-- Main G shape -->
    <path d="M-60,-100 C-120,-100 -140,-40 -140,20 C-140,80 -100,120 -40,120 C20,120 60,80 60,40 L60,0 L0,0 L0,40 L20,40 C20,60 0,80 -40,80 C-80,80 -100,60 -100,20 C-100,-20 -80,-60 -40,-60 C-10,-60 10,-40 20,-20 L60,-40 C40,-80 0,-100 -60,-100 Z"
          fill="white"/>
    <!-- Friendly sparkle/star -->
    <g transform="translate(80, -60)">
      <path d="M0,-30 L8,-8 L30,0 L8,8 L0,30 L-8,8 L-30,0 L-8,-8 Z" fill="white"/>
    </g>
    <!-- Small sparkle -->
    <g transform="translate(100, 20) scale(0.5)">
      <path d="M0,-30 L8,-8 L30,0 L8,8 L0,30 L-8,8 L-30,0 L-8,-8 Z" fill="white" opacity="0.7"/>
    </g>
  </g>
</svg>
